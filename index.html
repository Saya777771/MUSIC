<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Test</title>
    <style>
        /* 배경과 기본 스타일 */
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .wrapper { display: flex; gap: 40px; }
        
        /* 네온 박스 스타일 */
        .card { 
            padding: 40px; border-radius: 20px; background: #0a0a0a; width: 300px; text-align: center;
            border: 2px solid #ff00de; box-shadow: 0 0 15px #ff00de; /* 핑크 네온 */
        }
        .card.blue { border-color: #00f6ff; box-shadow: 0 0 15px #00f6ff; /* 블루 네온 */ }
        
        h2 { margin-bottom: 20px; }
        .test-box { width: 100%; height: 50px; background: #222; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h2>SIDE A</h2>
            <div class="test-box">노래 플레이어 들어갈 자리 1</div>
            <div class="test-box">노래 플레이어 들어갈 자리 2</div>
        </div>
        <div class="card blue">
            <h2>SIDE B</h2>
            <div class="test-box">노래 플레이어 들어갈 자리 3</div>
            <div class="test-box">노래 플레이어 들어갈 자리 4</div>
            <div class="test-box">노래 플레이어 들어갈 자리 5</div>
        </div>
    </div>
</body>
</html>
