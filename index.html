<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Cosmos Playlist - Natural Ripple</title>
    <style>
        /* [기본 디자인] */
        body { 
            background: radial-gradient(circle at center, #100010 0%, #000 70%, #000 100%);
            color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
            position: relative;
        }

        /* [우주 먼지 CSS] */
        #dust-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .dust-particle { position: absolute; background: #fff; border-radius: 50%; opacity: 0.6; animation: dust-move linear infinite; }
        @keyframes dust-move { to { transform: translateY(100vh); opacity: 0; } }

        /* [콘텐츠 레이아웃 및 디자인] */
        .main-title { font-size: 22px; letter-spacing: 6px; margin-bottom: 50px; color: #fff; text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de; position: relative; z-index: 3; }
        .wrapper { display: flex; gap: 40px; align-items: stretch; position: relative; z-index: 3; }
        .card { padding: 40px; border-radius: 25px; background: rgba(5, 5, 5, 0.95); width: 360px; display: flex; flex-direction: column; text-align: center; }
        
        /* SIDE A - 핑크 네온 */
        .card-pink { border: 2px solid #ff00de; box-shadow: 0 0 20px #ff00de; }
        .card-pink h2 { color: #ff00de; text-shadow: 0 0 15px #ff00de; margin-bottom: 30px; font-size: 16px; letter-spacing: 4px; }
        .card-pink .song-name { color: #ffb3f3; text-shadow: 0 0 8px rgba(255, 0, 222, 0.8); }
        .card-pink hr { border: 0; border-top: 1px solid #ff00de; opacity: 0.3; margin: 20px 0; }

        /* SIDE B - 블루 네온 */
        .card-blue { border: 2px solid #00f6ff; box-shadow: 0 0 20px #00f6ff; }
        .card-blue h2 { color: #00f6ff; text-shadow: 0 0 15px #00f6ff; margin-bottom: 30px; font-size: 16px; letter-spacing: 4px; }
        .card-blue .song-name { color: #b3faff; text-shadow: 0 0 8px rgba(0, 246, 255, 0.8); }
        .card-blue hr { border: 0; border-top: 1px solid #00f6ff; opacity: 0.3; margin: 20px 0; }

        /* 곡 아이템 효과 */
        .song-item { margin: 10px 0; padding: 15px; border-radius: 15px; transition: all 0.3s ease; }
        .song-item:hover { background: rgba(255, 255, 255, 0.05); transform: translateY(-3px); }
        .songs-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; }
        audio { filter: invert(1) hue-rotate(180deg) brightness(1.2); width: 100%; border-radius: 30px; }
        .song-name { font-size: 13px; margin-top: 15px; font-weight: bold; }

        /* [★수정됨★ 스타일 3: 자연스러운 클릭 파동 CSS] */
        .ripple {
            position: fixed;
            border-radius: 50%;
            transform: scale(0); /* 시작은 아주 작게 */
            /* ★수정: 시작은 투명하게(opacity:0), 끝으로 갈수록 부드럽게(ease-out)★ */
            animation: ripple-animation 0.8s ease-out; 
            background: radial-gradient(circle, rgba(255, 0, 222, 0.5) 0%, rgba(0, 246, 255, 0.3) 50%, rgba(255, 0, 222, 0) 100%);
            pointer-events: none;
            z-index: 2; 
        }

        /* ★수정: 애니메이션 디테일 조정★ */
        @keyframes ripple-animation {
            0% {
                transform: scale(0);
                opacity: 0; /* 시작은 안 보임 */
            }
            10% {
                opacity: 0.8; /* 아주 빠르게 밝아짐 (Fade In) */
            }
            100% {
                transform: scale(6); /* 더 넓게 퍼짐 */
                opacity: 0; /* 부드럽게 사라짐 (Fade Out) */
            }
        }
    </style>
</head>
<body>

    <div id="dust-container"></div>
    <h1 class="main-title">MY PRIVATE PLAYLIST</h1>

    <div class="wrapper">
        <div class="card card-pink">
            <h2>SIDE A</h2>
            <div class="songs-container">
                <div class="song-item">
                    <audio src="music1.mp3" controls loop></audio>
                    <div class="song-name">Track 01. music1.mp3</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio src="music2.mp3" controls loop></audio>
                    <div class="song-name">Track 02. music2.mp3</div>
                </div>
            </div>
        </div>

        <div class="card card-blue">
            <h2>SIDE B</h2>
            <div class="songs-container">
                <div class="song-item">
                    <audio src="music3.mp3" controls loop></audio>
                    <div class="song-name">Track 03. music3.mp3</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio src="music4.flac" controls loop></audio>
                    <div class="song-name">Track 04. music4.flac</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio src="music5.flac" controls loop></audio>
                    <div class="song-name">Track 05. music5.flac</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* 1. 우주 먼지 생성 */
        const dustContainer = document.getElementById('dust-container');
        const particleCount = 100;
        for (let i = 0; i < particleCount; i++) {
            const dust = document.createElement('div');
            dust.classList.add('dust-particle');
            dustContainer.appendChild(dust);
            const size = Math.random() * 3 + 1;
            dust.style.width = dust.style.height = size + 'px';
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.top = Math.random() * 100 + 'vh';
            const duration = Math.random() * 10 + 5;
            dust.style.animationDuration = duration + 's';
            dust.style.animationDelay = Math.random() * -15 + 's';
        }

        /* 2. 클릭 파동 */
        document.addEventListener('click', function(e) {
            const ripple = document.createElement('div');
            ripple.classList.add('ripple');
            document.body.appendChild(ripple);
            const size = 120; // 시작 크기는 적당히
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = e.clientX - size/2 + 'px';
            ripple.style.top = e.clientY - size/2 + 'px';
            // 애니메이션 시간과 맞춰서 제거 (0.8초)
            setTimeout(() => { ripple.remove(); }, 800);
        });
    </script>

</body>
</html>
