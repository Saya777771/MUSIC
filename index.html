<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Minimalist Playlist - Vertical</title>
    <style>
        body { 
            background: #f8f9fa; color: #333; 
            display: flex; flex-direction: column; align-items: center; 
            /* 세로로 길어지므로 justify-content는 제거하고 padding을 줍니다 */
            padding: 40px 0; margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif;
        }

        .main-title {
            font-size: 18px; letter-spacing: 3px; margin-bottom: 30px;
            color: #222; font-weight: 300;
        }

        /* 🛠️ 가로(row)에서 세로(column)로 변경 */
        .wrapper { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            width: 90%; 
            max-width: 400px; /* 세로형일 때 너무 넓어지지 않게 고정 */
        }

        .card { 
            padding: 25px; border-radius: 15px; background: #fff; 
            display: flex; flex-direction: column; text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        h2 { font-size: 14px; letter-spacing: 1px; margin-bottom: 20px; font-weight: 600; }

        .card-pink h2 { color: #ff2d55; }
        .card-blue h2 { color: #007aff; }
        .card-purple h2 { color: #af52de; }

        .song-item { margin: 15px 0; }
        
        audio { 
            width: 100%; height: 32px; outline: none; 
            border-radius: 8px; 
            filter: grayscale(1) contrast(1.2); 
            opacity: 0.8;
        }
        
        .card-pink audio:hover { filter: sepia(100%) saturate(300%) hue-rotate(300deg); opacity: 1; }
        .card-blue audio:hover { filter: sepia(100%) saturate(300%) hue-rotate(180deg); opacity: 1; }
        .card-purple audio:hover { filter: sepia(100%) saturate(300%) hue-rotate(240deg); opacity: 1; }

        .song-name { 
            font-size: 12px; margin-bottom: 8px; color: #666; font-weight: 500;
            display: flex; align-items: center;
        }
        
        .song-name::before { content: '•'; margin-right: 8px; }

        hr { border: 0; border-top: 1px solid #f0f0f0; margin: 10px 0; }
    </style>
</head>
<body>

    <h1 class="main-title">MY PRIVATE PLAYLIST</h1>

    <div class="wrapper">
        <div class="card card-pink">
            <h2>SIDE A</h2>
            <div class="songs-container">
                <div class="song-item">
                    <div class="song-name">Track 01. music1.mp3</div>
                    <audio src="music1.mp3" controls loop></audio>
                </div>
                <hr>
                <div class="song-item">
                    <div class="song-name">Track 02. music2.mp3</div>
                    <audio src="music2.mp3" controls loop></audio>
                </div>
            </div>
        </div>

        <div class="card card-blue">
            <h2>SIDE B</h2>
            <div class="songs-container">
                <div class="song-item">
                    <div class="song-name">Track 03. music3.flac</div>
                    <audio src="music3.flac" controls loop></audio>
                </div>
                <hr>
                <div class="song-item">
                    <div class="song-name">Track 04. music4.mp3</div>
                    <audio src="music4.mp3" controls loop></audio>
                </div>
            </div>
        </div>

        <div class="card card-purple">
            <h2>SIDE C</h2>
            <div class="songs-container">
                <div class="song-item">
                    <div class="song-name">Track 05. music5.flac</div>
                    <audio src="music5.flac" controls loop></audio>
                </div>
                <hr>
                <div class="song-item">
                    <div class="song-name">Track 06. music6.flac</div>
                    <audio src="music6.flac" controls loop></audio>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
