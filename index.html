<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Minimalist Playlist - 3x3 Grid</title>
    <style>
        body { 
            background: #f8f9fa; color: #333; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden; 
        }

        .main-title {
            font-size: 16px; letter-spacing: 2px; margin-bottom: 20px;
            color: #222; font-weight: 300;
        }

        /* 3x3 그리드 설정 */
        .wrapper { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 가로 3칸 */
            grid-template-rows: repeat(3, auto);   /* 세로 3칸 */
            gap: 15px; 
            width: 95%; 
            max-width: 1000px; /* 그리드 확장을 위해 가로폭 증대 */
        }

        .card { 
            padding: 15px 20px; 
            border-radius: 12px; background: #fff; 
            display: flex; flex-direction: column; text-align: left;
            box-shadow: 0 5px 20px rgba(0,0,0,0.04);
            border: 1px solid #eee;
        }

        /* 카드 위치 지정 */
        .pos-left-1 { grid-column: 1; grid-row: 1; } /* 왼쪽 첫번째 (SIDE A) */
        .pos-left-2 { grid-column: 1; grid-row: 2; } /* 왼쪽 두번째 (SIDE B) */
        .pos-left-3 { grid-column: 1; grid-row: 3; } /* 왼쪽 세번째 (SIDE C) */
        .pos-center-top { grid-column: 2; grid-row: 1; } /* 가운데 상단 (New Music 7) */

        h2 { font-size: 12px; letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }

        /* 컬러 테마 */
        .card-pink h2 { color: #ff2d55; }
        .card-blue h2 { color: #007aff; }
        .card-purple h2 { color: #af52de; }
        .card-orange h2 { color: #ff9500; } /* 주황색 추가 */

        .song-item { margin: 8px 0; } 
        
        audio { 
            width: 100%; height: 28px; outline: none; 
            border-radius: 6px; 
            filter: grayscale(1) contrast(1.2); 
            opacity: 0.8;
        }
        
        /* 호버 효과 */
        .card-pink audio:hover { filter: sepia(100%) saturate(300%) hue-rotate(300deg); opacity: 1; }
        .card-blue audio:hover { filter: sepia(100%) saturate(300%) hue-rotate(180deg); opacity: 1; }
        .card-purple audio:hover { filter: sepia(100%) saturate(300%) hue-rotate(240deg); opacity: 1; }
        .card-orange audio:hover { filter: sepia(100%) saturate(300%) hue-rotate(15deg); opacity: 1; }

        .song-name { 
            font-size: 11px; margin-bottom: 5px; color: #666; font-weight: 500;
            display: flex; align-items: center;
        }
        
        .song-name::before { content: '•'; margin-right: 6px; }

        hr { border: 0; border-top: 1px solid #f0f0f0; margin: 5px 0; }
    </style>
</head>
<body>

    <h1 class="main-title">MY PRIVATE PLAYLIST</h1>

    <div class="wrapper">
        <div class="card card-orange pos-center-top">
            <h2>NEW SIDE</h2>
            <div class="song-item">
                <div class="song-name">Track 07. music7.mp3</div>
                <audio src="music7.mp3" controls loop></audio>
            </div>
        </div>

        <div class="card card-pink pos-left-1">
            <h2>SIDE A</h2>
            <div class="song-item">
                <div class="song-name">Track 01. music1.mp3</div>
                <audio src="music1.mp3" controls loop></audio>
            </div>
            <hr>
            <div class="song-item">
                <div class="song-name">Track 02. music2.mp3</div>
                <audio src="music2.mp3" controls loop></audio>
            </div>
        </div>

        <div class="card card-blue pos-left-2">
            <h2>SIDE B</h2>
            <div class="song-item">
                <div class="song-name">Track 03. music3.flac</div>
                <audio src="music3.flac" controls loop></audio>
            </div>
            <hr>
            <div class="song-item">
                <div class="song-name">Track 04. music4.mp3</div>
                <audio src="music4.mp3" controls loop></audio>
            </div>
        </div>

        <div class="card card-purple pos-left-3">
            <h2>SIDE C</h2>
            <div class="song-item">
                <div class="song-name">Track 05. music5.flac</div>
                <audio src="music5.flac" controls loop></audio>
            </div>
            <hr>
            <div class="song-item">
                <div class="song-name">Track 06. music6.flac</div>
                <audio src="music6.flac" controls loop></audio>
            </div>
        </div>
        
        </div>

</body>
</html>
