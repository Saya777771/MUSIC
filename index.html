<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Minimalist Playlist - Soft Pastel</title>
    <style>
        body { 
            background: #fcfcfc; color: #444; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden; 
        }

        .main-title {
            font-size: 15px; letter-spacing: 2px; margin-bottom: 25px;
            color: #888; font-weight: 300;
        }

        .wrapper { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, auto);   
            gap: 18px; 
            width: 95%; 
            max-width: 1000px; 
        }

        .card { 
            padding: 18px 22px; 
            border-radius: 14px; background: #fff; 
            display: flex; flex-direction: column; text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        /* 위치 설정 */
        .pos-left-1 { grid-column: 1; grid-row: 1; }
        .pos-left-2 { grid-column: 1; grid-row: 2; }
        .pos-left-3 { grid-column: 1; grid-row: 3; }
        .pos-center-1 { grid-column: 2; grid-row: 1; } 
        .pos-center-2 { grid-column: 2; grid-row: 2; } 

        h2 { font-size: 11px; letter-spacing: 1.5px; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; }

        /* 연한 파스텔 톤 제목 색상 */
        .card-pink h2 { color: #f4a2b3; }    /* 연핑크 */
        .card-blue h2 { color: #a2c2f4; }    /* 연하늘 */
        .card-purple h2 { color: #c2a2f4; }  /* 연보라 */
        .card-orange h2 { color: #f4c2a2; }  /* 연주황 */
        .card-amber h2 { color: #f4e2a2; }   /* 연노랑 */

        .song-item { margin: 8px 0; } 
        
        audio { 
            width: 100%; height: 26px; outline: none; 
            border-radius: 6px; 
            filter: grayscale(1) opacity(0.3); /* 평소에는 아주 연하게 */
            transition: all 0.4s ease;
        }
        
        /* 마우스 호버 시 - 각 제목색과 일치하는 연한 유채색 */
        /* 연핑크 */
        .card-pink audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(310deg) brightness(1.1); opacity: 1; }
        /* 연하늘 */
        .card-blue audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(180deg) brightness(1.1); opacity: 1; }
        /* 연보라 */
        .card-purple audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(240deg) brightness(1.1); opacity: 1; }
        /* 연주황 */
        .card-orange audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(10deg) brightness(1.1); opacity: 1; }
        /* 연노랑 */
        .card-amber audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(30deg) brightness(1.1); opacity: 1; }

        .song-name { 
            font-size: 10.5px; margin-bottom: 6px; color: #999; font-weight: 400;
            display: flex; align-items: center;
        }
        
        .song-name::before { content: '•'; margin-right: 8px; color: inherit; opacity: 0.5; }
        hr { border: 0; border-top: 1px solid #f8f8f8; margin: 6px 0; }
    </style>
</head>
<body>

    <h1 class="main-title">MY PRIVATE PLAYLIST</h1>

    <div class="wrapper">
        <div class="card card-orange pos-center-1">
            <h2>New Side A</h2>
            <div class="song-item">
                <div class="song-name">music7.flac</div>
                <audio src="music7.flac" controls loop></audio>
            </div>
            <hr>
            <div class="song-item">
                <div class="song-name">music8.flac</div>
                <audio src="music8.flac" controls loop></audio>
            </div>
        </div>

        <div class="card card-amber pos-center-2">
            <h2>New Side B</h2>
            <div class="song-item">
                <div class="song-name">music9.mp3</div>
                <audio src="music9.mp3" controls loop></audio>
            </div>
        </div>

        <div class="card card-pink pos-left-1">
            <h2>Side A</h2>
            <div class="song-item"><div class="song-name">music1.mp3</div><audio src="music1.mp3" controls loop></audio></div>
            <hr>
            <div class="song-item"><div class="song-name">music2.mp3</div><audio src="music2.mp3" controls loop></audio></div>
        </div>

        <div class="card card-blue pos-left-2">
            <h2>Side B</h2>
            <div class="song-item"><div class="song-name">music3.flac</div><audio src="music3.flac" controls loop></audio></div>
            <hr>
            <div class="song-item"><div class="song-name">music4.mp3</div><audio src="music4.mp3" controls loop></audio></div>
        </div>

        <div class="card card-purple pos-left-3">
            <h2>Side C</h2>
            <div class="song-item"><div class="song-name">music5.flac</div><audio src="music5.flac" controls loop></audio></div>
            <hr>
            <div class="song-item"><div class="song-name">music6.flac</div><audio src="music6.flac" controls loop></audio></div>
        </div>
    </div>

</body>
</html>
