<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Starry Night Playlist</title>
    <style>
        body { 
            /* 눈이 편안한 밤하늘 배경 */
            background: #0f1218; color: #e0e0e0; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden; /* 별이 화면 밖으로 나가는 것 방지 */
            position: relative;
        }

        /* ✨ 별 애니메이션 스타일 */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10vh) translateX(0); }
            to { transform: translateY(110vh) translateX(20px); }
        }

        .main-title {
            font-size: 16px; letter-spacing: 5px; margin-bottom: 40px;
            color: #aaa; font-weight: 300; z-index: 10;
        }

        .wrapper { display: flex; gap: 20px; align-items: stretch; max-width: 1200px; z-index: 10; }

        .card { 
            padding: 25px; border-radius: 18px; background: rgba(25, 28, 35, 0.9); 
            width: 300px; display: flex; flex-direction: column; text-align: left;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #2a2e37;
            backdrop-filter: blur(5px); /* 카드 뒤로 별이 살짝 흐리게 보임 */
        }

        h2 { font-size: 13px; letter-spacing: 1.5px; margin-bottom: 25px; font-weight: 600; }

        .card-pink h2 { color: #ff375f; }
        .card-blue h2 { color: #0a84ff; }
        .card-purple h2 { color: #bf5af2; }

        .song-item { margin: 15px 0; }
        
        audio { 
            width: 100%; height: 32px; outline: none; 
            border-radius: 8px; 
            filter: invert(0.9) hue-rotate(180deg) brightness(1.2);
            opacity: 0.7;
        }
        
        audio:hover { opacity: 1; }

        .song-name { 
            font-size: 11px; margin-bottom: 8px; color: #999; font-weight: 500;
            display: flex; align-items: center;
        }
        
        .song-name::before { content: '✦'; margin-right: 8px; color: #444; }

        hr { border: 0; border-top: 1px solid #2a2e37; margin: 10px 0; }
    </style>
</head>
<body>

            </div>

                <div class="song-item">
