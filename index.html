<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Night - Glitch Effect</title>
    <style>
        /* [원본 네온 디자인 100% 유지] */
        body { 
            background: radial-gradient(circle at center, #100010 0%, #000 70%, #000 100%);
            color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; position: relative;
        }

        #dust-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .dust-particle { position: absolute; background: #fff; border-radius: 50%; opacity: 0.4; animation: dust-move linear infinite; }
        @keyframes dust-move { to { transform: translateY(100vh); opacity: 0; } }

        .main-title { font-size: 22px; letter-spacing: 6px; margin-bottom: 50px; color: #fff; text-shadow: 0 0 10px #ff00de; position: relative; z-index: 3; }
        .wrapper { display: flex; gap: 40px; position: relative; z-index: 3; }
        .card { padding: 40px; border-radius: 25px; background: rgba(5, 5, 5, 0.95); width: 360px; text-align: center; }
        
        .card-pink { border: 2px solid #ff00de; box-shadow: 0 0 20px #ff00de; }
        .card-pink h2 { color: #ff00de; text-shadow: 0 0 15px #ff00de; margin-bottom: 30px; font-size: 16px; letter-spacing: 4px; }
        
        .card-blue { border: 2px solid #00f6ff; box-shadow: 0 0 20px #00f6ff; }
        .card-blue h2 { color: #00f6ff; text-shadow: 0 0 15px #00f6ff; margin-bottom: 30px; font-size: 16px; letter-spacing: 4px; }

        .song-item { margin: 10px 0; padding: 15px; border-radius: 15px; transition: 0.3s; }
        .song-item:hover { background: rgba(255, 255, 255, 0.05); }
        audio { filter: invert(1) hue-rotate(180deg) brightness(1.2); width: 100%; border-radius: 30px; }
        .song-name { font-size: 13px; margin-top: 15px; font-weight: bold; color: #ccc; }

        /* [★새로운 클릭 효과: 글리치 라인] */
        .glitch-line {
            position: fixed;
            left: 0;
            width: 100vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 10px #fff;
            pointer-events: none;
            z-index: 9999;
            animation: glitch-anim 0.2s ease-out forwards;
        }

        @keyframes glitch-anim {
            0% { transform: scaleX(0); opacity: 0; }
            50% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="dust-container"></div>
    <h1 class="main-title">MY PRIVATE PLAYLIST</h1>

    <div class="wrapper">
        <div class="card card-pink">
            <h2>SIDE A</h2>
            <div class="song-item">
                <audio src="music1.mp3" controls loop></audio>
                <div class="song-name">Track 01. music1.mp3</div>
            </div>
            <div class="song-item">
                <audio src="music2.mp3" controls loop></audio>
                <div class="song-name">Track 02. music2.mp3</div>
            </div>
        </div>

        <div class="card card-blue">
            <h2>SIDE B</h2>
            <div class="song-item">
                <audio src="music3.mp3" controls loop></audio>
                <div class="song-name">Track 03. music3.mp3</div>
            </div>
            <div class="song-item">
                <audio src="music4.flac" controls loop></audio>
                <div class="song-name">Track 04. music4.flac</div>
            </div>
        </div>
    </div>

    <script>
        /* 우주 먼지 생략 (기존과 동일하게 작동) */
        const dustContainer = document.getElementById('dust-container');
        for (let i = 0; i < 80; i++) {
            const dust = document.createElement('div');
            dust.classList.add('dust-particle');
            dustContainer.appendChild(dust);
            dust.style.width = dust.style.height = Math.random() * 2 + 1 + 'px';
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.top = Math.random() * 100 + 'vh';
            dust.style.animationDuration = Math.random() * 10 + 10 + 's';
        }

        /* [★클릭 시 글리치 라인 생성] */
        document.addEventListener('click', function(e) {
            // 클릭 지점을 기준으로 위아래에 라인 2개 생성
            for (let i = 0; i < 2; i++) {
                const line = document.createElement('div');
                line.classList.add('glitch-line');
                document.body.appendChild(line);

                // 클릭한 높이 근처에서 약간의 오차를 두고 생성
                const offset = (i === 0) ? -10 : 10;
                line.style.top = (e.clientY + offset) + 'px';
                
                // 파란색/핑크색 느낌 섞기
                line.style.background = (i === 0) ? '#ff00de' : '#00f6ff';
                line.style.boxShadow = `0 0 15px ${line.style.background}`;

                setTimeout(() => line.remove(), 200);
            }
        });
    </script>

</body>
</html>
