<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Night - Clean Version</title>
    <style>
        /* [원본 네온 디자인 100% 유지] */
        body { 
            background: radial-gradient(circle at center, #100010 0%, #000 70%, #000 100%);
            color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; position: relative;
        }

        /* [우주 먼지 효과] */
        #dust-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .dust-particle { position: absolute; background: #fff; border-radius: 50%; opacity: 0.4; animation: dust-move linear infinite; }
        @keyframes dust-move { to { transform: translateY(100vh); opacity: 0; } }

        /* [콘텐츠 레이아웃] */
        .main-title { font-size: 22px; letter-spacing: 6px; margin-bottom: 50px; color: #fff; text-shadow: 0 0 10px #ff00de; position: relative; z-index: 3; }
        .wrapper { display: flex; gap: 40px; position: relative; z-index: 3; }
        .card { padding: 40px; border-radius: 25px; background: rgba(5, 5, 5, 0.95); width: 360px; text-align: center; }
