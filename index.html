<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Private Playlist</title>
    <style>
        body { 
            background: #000; color: #fff; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: sans-serif; 
        }

        /* 두 개의 공간(카드)을 감싸는 전체 레이아웃 */
        .wrapper { 
            display: flex; 
            gap: 30px; /* 두 공간 사이의 '살짝의 거리'를 조절합니다 */
            align-items: flex-start;
        }

        /* 각 곡들이 담기는 개별 공간 스타일 */
        .playlist-card { 
            border: 1px solid #333; 
            padding: 40px; 
            border-radius: 20px; 
            background: #0a0a0a; 
            text-align: center;
            width: 350px; /* 각 공간의 너비 */
        }

        h2 { color: #666; font-size: 13px; margin-bottom: 40px; letter-spacing: 2px; }

        /* 곡 아이템 스타일 */
        .song-item { margin-bottom: 10px; }
        audio { filter: invert(1); width: 100%; outline: none; }
        .song-name { font-size: 12px; color: #888; margin-top: 10px; font-weight: bold; }

        /* 구분선 */
        hr { border: 0; border-top: 1px solid #222; width: 100%; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div class="playlist-card">
            <h2>SIDE A</h2>
            <div class="song-item">
                <audio id="audio1" src="music1.mp3" controls loop></audio>
                <div class="song-name">Track 01. music1.mp3</div>
            </div>
            <hr>
            <div class="song-item">
                <audio id="audio2" src="music2.mp3" controls loop></audio>
                <div class="song-name">Track 02. music2.mp3</div>
            </div>
        </div>

        <div class="playlist-card">
            <h2>SIDE B</h2>
            <div class="song-item">
                <audio id="audio3" src="music3.mp3" controls loop></audio>
                <div class="song-name">Track 03. music3.mp3</div>
            </div>
            <hr>
            <div class="song-item">
                <audio id="audio4" src="music4.flac" controls loop></audio>
                <div class="song-name">Track 04. music4.flac</div>
            </div>
            <hr>
            <div class="song-item">
                <audio id="audio5" src="music5.flac" controls loop></audio>
                <div class="song-name">Track 05. music5.flac</div>
            </div>
        </div>

    </div>

</body>
</html>
