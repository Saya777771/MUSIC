<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Night Playlist - 3 Columns</title>
    <style>
        body { 
            background: #000; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif;
        }

        .main-title {
            font-size: 20px; letter-spacing: 5px; margin-bottom: 50px;
            color: #fff; text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de;
        }

        /* 카드가 3개가 되므로 전체 너비 조절 */
        .wrapper { display: flex; gap: 30px; align-items: stretch; max-width: 1200px; }

        .card { 
            padding: 30px; border-radius: 20px; background: #050505; 
            width: 320px; display: flex; flex-direction: column; text-align: center;
        }

        /* SIDE A - 핑크 */
        .card-pink { border: 2px solid #ff00de; box-shadow: 0 0 20px #ff00de, inset 0 0 10px #ff00de; }
        .card-pink h2 { color: #ff00de; text-shadow: 0 0 10px #ff00de; margin-bottom: 30px; }
        .card-pink .song-name { color: #ffb3f3; text-shadow: 0 0 5px #ff00de; }
        .card-pink hr { border: 0; border-top: 1px solid #ff00de; opacity: 0.4; margin: 15px 0; }

        /* SIDE B - 블루 */
        .card-blue { border: 2px solid #00f6ff; box-shadow: 0 0 20px #00f6ff, inset 0 0 10px #00f6ff; }
        .card-blue h2 { color: #00f6ff; text-shadow: 0 0 10px #00f6ff; margin-bottom: 30px; }
        .card-blue .song-name { color: #b3faff; text-shadow: 0 0 5px #00f6ff; }
        .card-blue hr { border: 0; border-top: 1px solid #00f6ff; opacity: 0.4; margin: 15px 0; }

        /* [NEW] SIDE C - 보라색 네온 */
        .card-purple { border: 2px solid #bc13fe; box-shadow: 0 0 20px #bc13fe, inset 0 0 10px #bc13fe; }
        .card-purple h2 { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; margin-bottom: 30px; }
        .card-purple .song-name { color: #eabfff; text-shadow: 0 0 5px #bc13fe; }
        .card-purple hr { border: 0; border-top: 1px solid #bc13fe; opacity: 0.4; margin: 15px 0; }

        .songs-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; }
        .song-item { margin: 10px 0; }
        audio { filter: invert(1) hue-rotate(180deg); width: 100%; outline: none; border-radius: 30px; }
        .song-name { font-size: 11px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 class="main-title">MY PRIVATE PLAYLIST</h1>

    <div class="wrapper">
        <div class="card card-pink">
            <h2>SIDE A</h2>
            <div class="songs-container">
                <div class="song-item">
                    <audio src="music1.mp3" controls loop></audio>
                    <div class="song-name">Track 01. music1.mp3</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio src="music2.mp3" controls loop></audio>
                    <div class="song-name">Track 02. music2.mp3</div>
                </div>
            </div>
        </div>

        <div class="card card-blue">
            <h2>SIDE B</h2>
            <div class="songs-container">
                <div class="song-item">
                    <audio src="music3.flac" controls loop></audio>
                    <div class="song-name">Track 03. music3.flac</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio src="music4.mp3" controls loop></audio>
                    <div class="song-name">Track 04. music4.mp3</div>
                </div>
            </div>
        </div>

        <div class="card card-purple">
            <h2>SIDE C</h2>
            <div class="songs-container">
                <div class="song-item">
                    <audio src="music5.flac" controls loop></audio>
                    <div class="song-name">Track 05. music5.flac</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio src="music6.flac" controls loop></audio>
                    <div class="song-name">Track 06. music6.flac</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
