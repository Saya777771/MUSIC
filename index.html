<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Playlist</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #song-title { margin-bottom: 20px; font-size: 1.2rem; color: #aaa; }
        audio { filter: invert(1); width: 300px; }
        .status { margin-top: 20px; font-size: 0.8rem; color: #444; }
    </style>
</head>
<body>

    <div id="song-title">준비 중...</div>
    <audio id="player" controls></audio>
    <div class="status">화면을 클릭하면 재생이 시작됩니다.</div>

    <script>
        const playlist = [
            { title: "노래 1번", src: "music1.mp3" },
            { title: "노래 2번", src: "music2.mp3" }
        ];

        let currentIndex = 0;
        const player = document.getElementById('player');
        const titleDisplay = document.getElementById('song-title');

        function loadSong(index) {
            const song = playlist[index];
            player.src = song.src;
            titleDisplay.innerText = "재생 중: " + song.title;
            player.play().catch(e => {
                console.log("브라우저 차단: 클릭이 필요합니다.");
            });
        }

        // 페이지 어디든 클릭하면 첫 곡 재생
        window.addEventListener('click', () => {
            if (!player.src || player.src === "") {
                loadSong(currentIndex);
            }
        }, { once: true });

        // 곡 끝나면 다음 곡으로
        player.onended = () => {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadSong(currentIndex);
        };

        // 초기 안내
        titleDisplay.innerText = "클릭해서 재생 시작";
    </script>
</body>
</html>
