<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>White & Golden Star Playlist</title>
    <style>
        body { 
            /* 깨끗한 올 화이트 배경 */
            background: #ffffff; color: #333; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden; /* 별이 화면 밖으로 나가는 것 방지 */
            position: relative;
        }

        /* ✨ 노란 별 애니메이션 스타일 */
        .star {
            position: absolute;
            background: #ffcc00; /* 따뜻한 노란색 별 */
            border-radius: 50%;
            opacity: 0.6;
            animation: fall linear infinite;
            box-shadow: 0 0 5px rgba(255, 204, 0, 0.4); /* 살짝 빛나는 효과 */
        }

        @keyframes fall {
            from { transform: translateY(-10vh) translateX(0); }
            to { transform: translateY(110vh) translateX(20px); }
        }

        .main-title {
            font-size: 18px; letter-spacing: 3px; margin-bottom: 40px;
            color: #222; font-weight: 300; z-index: 10;
        }

        .wrapper { display: flex; gap: 20px; align-items: stretch; max-width: 1200px; z-index: 10; }

        .card { 
            padding: 25px; border-radius: 15px; 
            background: rgba(255, 255, 255, 0.9); /* 카드는 살짝 투명해서 별이 비침 */
            width: 300px; display: flex; flex-direction: column; text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #eee;
            backdrop-filter: blur(3px); /* 카드 뒤로 별이 살짝 흐리게 보임 */
        }

        h2 { font-size: 14px; letter-spacing: 1px; margin-bottom: 20px; font-weight: 600; }

        /* 포인트 컬러 (기본 화이트 테마 유지) */
        .card-pink h2 { color: #ff2d55; }
        .card-blue h2 { color: #007aff; }
        .card-purple h2 { color: #af52de; }
