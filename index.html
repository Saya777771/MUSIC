<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Cosmos - Rotating Flow</title>
    <style>
        body { 
            background: #000; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* [우주 먼지] */
        #dust-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .dust-particle { position: absolute; background: #fff; border-radius: 50%; opacity: 0.3; animation: dust-move linear infinite; }
        @keyframes dust-move { to { transform: translateY(100vh); opacity: 0; } }

        .main-title { font-size: 18px; letter-spacing: 8px; margin-bottom: 60px; color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); font-weight: 300; position: relative; z-index: 3; }
        .wrapper { display: flex; gap: 50px; align-items: stretch; position: relative; z-index: 3; }

        /* [네온 회전 카드의 핵심 구조] */
        .card { 
            position: relative;
            padding: 45px; border-radius: 30px; 
            background: #0a0a0a; /* 배경을 불투명하게 해야 회전 빛이 뒤로 숨음 */
            width: 340px; 
            display: flex; flex-direction: column; text-align: center;
            overflow: hidden; /* 테두리 밖으로 나가는 빛 커트 */
        }

        /* 테두리를 따라 회전하는 빛의 정체 (가짜 테두리) */
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--neon-color));
            animation: rotate 4s linear infinite;
            z-index: -2;
        }

        /* 내부 배경 (빛이 테두리처럼 보이게 덮어주는 역할) */
        .card::after {
            content: '';
            position: absolute;
            inset: 3px; /* 테두리 두께 조절 */
            background: #0a0a0a;
            border-radius: 28px;
            z-index: -1;
        }

        /* 핑크/블루 색상 정의 */
        .card-pink { --neon-color: #ff00de; box-shadow: 0 0 20px rgba(255, 0, 222, 0.2); }
        .card-blue { --neon-color: #00f6ff; box-shadow: 0 0 20px rgba(0, 246, 255, 0.2); }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h2 { font-size: 13px; letter-spacing: 5px; margin-bottom: 30px; opacity: 0.8; color: var(--neon-color); text-shadow: 0 0 10px var(--neon-color); }
        .song-item { margin: 15px 0; padding: 10px; border-radius: 12px; transition: background 0.3s; }
        .song-item:hover { background: rgba(255, 255, 255, 0.03); }
        audio { filter: invert(1) grayscale(1) opacity(0.7); width: 100%; }
        .song-name { font-size: 11px; margin-top: 15px; color: #888; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="dust-container"></div>
    <h1 class="main-title">PRIVATE SELECTION</h1>

    <div class="wrapper">
        <div class="card card-pink">
            <h2>SIDE A</h2>
            <div class="song-item">
                <audio src="music1.mp3" controls loop></audio>
                <div class="song-name">01. music1.mp3</div>
            </div>
            <div class="song-item">
                <audio src="music2.mp3" controls loop></audio>
                <div class="song-name">02. music2.mp3</div>
            </div>
        </div>

        <div class="card card-blue">
            <h2>SIDE B</h2>
            <div class="song-item">
                <audio src="music3.mp3" controls loop></audio>
                <div class="song-name">03. music3.mp3</div>
            </div>
            <div class="song-item">
                <audio src="music4.flac" controls loop></audio>
                <div class="song-name">04. music4.flac</div>
            </div>
            <div class="song-item">
                <audio src="music5.flac" controls loop></audio>
                <div class="song-name">05. music5.flac</div>
            </div>
        </div>
    </div>

    <script>
        /* 우주 먼지 애니메이션 */
        const dustContainer = document.getElementById('dust-container');
        for (let i = 0; i < 60; i++) {
            const dust = document.createElement('div');
            dust.classList.add('dust-particle');
            dustContainer.appendChild(dust);
            const size = Math.random() * 2;
            dust.style.width = dust.style.height = size + 'px';
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.top = Math.random() * 100 + 'vh';
            dust.style.animationDuration = (Math.random() * 20 + 10) + 's';
            dust.style.animationDelay = (Math.random() * -20) + 's';
        }
    </script>
</body>
</html>
