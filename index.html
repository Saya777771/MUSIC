<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Private Playlist</title>
    <style>
        body { 
            background: #000; color: #fff; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: sans-serif; 
        }
        .container { 
            border: 1px solid #333; padding: 40px; border-radius: 20px; 
            background: #0a0a0a; 
            /* width를 빼고 내용물에 맞게 늘어나게 설정 */
            display: inline-block; 
            text-align: center;
        }
        h2 { color: #666; font-size: 14px; margin-bottom: 50px; letter-spacing: 2px; }

        /* 좌우 기둥 사이의 간격 설정 */
        .playlist-wrapper { 
            display: flex; 
            justify-content: center; 
            gap: 80px; /* 이 숫자를 키우면 더 멀어지고, 줄이면 더 붙습니다 */
            align-items: flex-start; 
        }

        .column { 
            display: flex; flex-direction: column; gap: 30px; 
            width: 320px; 
        }
        
        .song-item { margin-bottom: 5px; }
        audio { filter: invert(1); width: 100%; outline: none; }
        .song-name { font-size: 12px; color: #888; margin-top: 10px; font-weight: bold; }

        hr { border: 0; border-top: 1px solid #222; width: 100%; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h2>MY PRIVATE PLAYLIST</h2>
        
        <div class="playlist-wrapper">
            <div class="column">
                <div class="song-item">
                    <audio id="audio1" src="music1.mp3" controls loop></audio>
                    <div class="song-name">Track 01. music1.mp3 (Loop ON)</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio id="audio2" src="music2.mp3" controls loop></audio>
                    <div class="song-name">Track 02. music2.mp3 (Loop ON)</div>
                </div>
            </div>

            <div class="column">
                <div class="song-item">
                    <audio id="audio3" src="music3.mp3" controls loop></audio>
                    <div class="song-name">Track 03. music3.mp3 (Loop ON)</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio id="audio4" src="music4.flac" controls loop></audio>
                    <div class="song-name">Track 04. music4.flac (High Fidelity)</div>
                </div>
                <hr>
                <div class="song-item">
                    <audio id="audio5" src="music5.flac" controls loop></audio>
                    <div class="song-name">Track 05. music5.flac (High Fidelity)</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
