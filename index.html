<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Minimalist Playlist - Color Corrected</title>
    <style>
        body { 
            background: #f8f9fa; color: #333; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden; 
        }

        .main-title {
            font-size: 16px; letter-spacing: 2px; margin-bottom: 20px;
            color: #222; font-weight: 300;
        }

        .wrapper { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, auto);   
            gap: 15px; 
            width: 95%; 
            max-width: 1000px; 
        }

        .card { 
            padding: 15px 20px; 
            border-radius: 12px; background: #fff; 
            display: flex; flex-direction: column; text-align: left;
            box-shadow: 0 5px 20px rgba(0,0,0,0.04);
            border: 1px solid #eee;
        }

        /* 위치 설정 */
        .pos-left-1 { grid-column: 1; grid-row: 1; }
        .pos-left-2 { grid-column: 1; grid-row: 2; }
        .pos-left-3 { grid-column: 1; grid-row: 3; }
        .pos-center-1 { grid-column: 2; grid-row: 1; } 
        .pos-center-2 { grid-column: 2; grid-row: 2; } 

        h2 { font-size: 12px; letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }

        /* 제목 색상 */
        .card-pink h2 { color: #ff2d55; }
        .card-blue h2 { color: #007aff; }
        .card-purple h2 { color: #af52de; }
        .card-orange h2 { color: #ff9500; } /* New Side A: 주황 */
        .card-amber h2 { color: #ffcc00; }  /* New Side B: 노랑 */

        .song-item { margin: 8px 0; } 
        
        audio { 
            width: 100%; height: 28px; outline: none; 
            border-radius: 6px; 
            filter: grayscale(1) contrast(1.2); 
            opacity: 0.8;
        }
        
        /* 마우스 호버 시: 제목 색상과 맞춘 연한 색감 */
        .card-pink audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(305deg); opacity: 1; }
        .card-blue audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(185deg); opacity: 1; }
        .card-purple audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(245deg); opacity: 1; }
        
        /* [New Side A - 주황색] 확실한 주황 유지 */
        .card-orange audio:hover { filter: sepia(100%) saturate(150%) hue-rotate(10deg); opacity: 1; }
        
        /* [New Side B - 노란색] 각도를 더 높여서 확실한 노란색으로 수정 */
        .card-amber audio:hover { filter: sepia(100%) saturate(180%) hue-rotate(45deg); opacity: 1; }

        .song-name { 
            font-size: 11px; margin-bottom: 5px; color: #666; font-weight: 500;
            display: flex; align-items: center;
        }
        
        .song-name::before { content: '•'; margin-right: 6px; }
        hr { border: 0; border-top: 1px solid #f0f0f0; margin: 5px 0; }
    </style>
</head>
<body>

    <h1 class="main-title">MY PRIVATE PLAYLIST</h1>

    <div class="wrapper">
        <div class="card card-orange pos-center-1">
            <h2>New Side A</h2>
            <div class="song-item">
                <div class="song-name">music7.flac</div>
                <audio src="music7.flac" controls loop></audio>
            </div>
            <hr>
            <div class="song-item">
                <div class="song-name">music8.flac</div>
                <audio src="music8.flac" controls loop></audio>
            </div>
        </div>

        <div class="card card-amber pos-center-2">
            <h2>New Side B</h2>
            <div class="song-item">
                <div class="song-name">music9.mp3</div>
                <audio src="music9.mp3" controls loop></audio>
            </div>
        </div>

        <div class="card card-pink pos-left-1">
            <h2>Side A</h2>
            <div class="song-item"><div class="song-name">music1.mp3</div><audio src="music1.mp3" controls loop></audio></div>
            <hr>
            <div class="song-item"><div class="song-name">music2.mp3</div><audio src="music2.mp3" controls loop></audio></div>
        </div>

        <div class="card card-blue pos-left-2">
            <h2>Side B</h2>
            <div class="song-item"><div class="song-name">music3.flac</div><audio src="music3.flac" controls loop></audio></div>
            <hr>
            <div class="song-item"><div class="song-name">music4.mp3</div><audio src="music4.mp3" controls loop></audio></div>
        </div>

        <div class="card card-purple pos-left-3">
            <h2>Side C</h2>
            <div class="song-item"><div class="song-name">music5.flac</div><audio src="music5.flac" controls loop></audio></div>
            <hr>
            <div class="song-item"><div class="song-name">music6.flac</div><audio src="music6.flac" controls loop></audio></div>
        </div>
    </div>

</body>
</html>
